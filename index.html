<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영어 워드 마스터 서비스 (단원 선택 모드)</title>
    <style>
        /* 공통 스타일 */
        body {
            justify-content: center; align-items: center; display: flex; height: 100vh; margin: 0;
            background-color: #f5f5f5; font-family: Arial, sans-serif; overflow: hidden; flex-direction: column;
        }
        ::-webkit-scrollbar { display: none; }

        /* ================= 로그인 화면 스타일 ================= */
        .login-container {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 40px; width: 550px; height: 520px; background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px); border: 1px solid gray; border-radius: 20px;
            box-shadow: 0px 0px 30px 2px rgb(105, 105, 105); z-index: 10; padding: 20px; box-sizing: border-box;
        }
        .login-container .h { font-size: 50px; font-weight: bold; margin-bottom: 20px; }
        .login-container input {
            border-radius: 10px; width: 85%; padding: 10px 20px; height: 45px;
            background-color: white; border: 1px solid #ccc; margin: 15px 0; font-size: 20px; box-sizing: border-box;
        }
        .login-container button {
            border-radius: 30px; width: 85%; height: 60px; font-size: 25px;
            margin-top: 30px; background-color: black; color: #fff; border: none; cursor: pointer;
        }
        .login-container button:hover { background-color: rgb(53, 53, 53); }
        
        /* 캐릭터 눈 애니메이션 */
        .round {
            width: 200px; height: 140px; background-color: rgb(0, 0, 0);
            border-top-left-radius: 100px; border-top-right-radius: 100px;
            position: absolute; bottom: 0px; overflow: hidden; display: flex; justify-content: center; align-items: center;
        }
        .eyes { display: flex; justify-content: center; align-items: center; gap: 20px; width: 100%; margin-top: -20px; }
        .eye-socket { 
            width: 45px; height: 45px; background-color: white; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; transition: all 0.2s ease;
        }
        .eye { width: 18px; height: 18px; background-color: #000; border-radius: 50%; transform-origin: center; }
        .eye-socket.blind { height: 4px; border-radius: 0; background-color: #000; }
        .eye-socket.blind .eye { display: none; }

        /* ================= 테스트 화면 스타일 ================= */
        .test-container { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; }
        .test-container .input {
            width: 120px; height: 40px; transition: 1s; padding: 0 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;
        }
        .test-container .input:hover, .test-container .input:focus { background-color: transparent; border-radius: 10px; width: 500px; height: 40px; }
        .test-container .box { transform: scale(1.2); display: flex; gap: 5px; z-index: 10; margin-top: 50px;}
        .test-container .box_2 { position: absolute; background-color: transparent; top: 35%; text-align: center; }
        .test-container button { border-radius: 10px; background-color: #fff; border: 1px solid #ccc; height: 40px; cursor: pointer; padding: 0 15px; }
        .test-container button:hover { background-color: #eee; }
        
        /* 제어 바 (모드 변경 및 단원 이동) */
        .test-container .choice { position: absolute; top: 18%; display: flex; gap: 10px; transform: scale(1.3); z-index: 20; align-items: center;}
        .test-container .choice select { height: 40px; border-radius: 10px; border: 1px solid #ccc; padding: 0 10px; font-weight: bold; cursor: pointer;}
        
        .test-container .H1 { font-size: 55px; margin: 0; }
        .test-container .check_box {
            width: 800px; height: 50px; background-color: black; position: absolute; top: 2%; border-radius: 10px;
            color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 14px;
        }
        .test-container .detail {
            width: 800px; height: 120px; background-color: gray; border-radius: 10px; position: absolute; bottom: 12%;
            font-size: 35px; color: white; display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .test-container .user-info { position: absolute; top: 11%; font-weight: bold; color: #333; font-size: 18px; }
        
        /* 엑셀/CSV 업로드 영역 */
        .upload-box { position: absolute; top: 8%; right: 2%; background: #fff; padding: 10px; border-radius: 8px; border: 1px dashed #777; font-size: 12px; z-index: 30;}
        .upload-box input { margin-top: 5px; }

        /* 기록 확인 버튼 */
        .history-trigger-btn { position: absolute; bottom: 4%; background: #2c3e50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;}
        .history-trigger-btn:hover { background: #34495e; }

        /* ================= 최종 성적표 리포트 스타일 추가 ================= */
        .report-card {
            background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 700px; max-height: 60vh; overflow-y: auto; text-align: center; z-index: 40; margin-top: 50px;
        }
        .report-card h2 { color: #333; margin-top: 0; }
        .score { font-size: 24px; font-weight: bold; color: #2ecc71; margin-bottom: 20px; }
        .result-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 16px; }
        .result-table th, .result-table td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .result-table th { background-color: #f8f9fa; font-weight: bold; }
        .correct { color: #2ecc71; font-weight: bold; }
        .incorrect { color: #e74c3c; font-weight: bold; }
        .report-btns { margin-top: 25px; display: flex; justify-content: center; gap: 15px; }
        .report-btns button { padding: 10px 20px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .retry-btn { background-color: #3498db; color: white; border: none; }
        .retry-btn:hover { background-color: #2980b9; }
        .next-btn { background-color: #2ecc71; color: white; border: none; }
        .next-btn:hover { background-color: #27ae60; }

        /* 기록 팝업 모달 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center;}
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 750px; max-height: 70vh; overflow-y: auto; position: relative;}
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; border: none; background: none;}
    </style>
</head>
<body>

    <div id="loginSection" class="login-container">
        <form id="form" onsubmit="return false;" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
            <div class="h">SIGN IN</div>
            <input id="inputName" placeholder="이름을 입력하세요..." autocomplete="off">
            <input id="inputPassword" type="password" placeholder="비밀번호(학번)...">
            <button id="loginBtn" type="button" onclick="loginCheck()">LOGIN</button>

    <div id="testSection" class="test-container">

            <input type="file" id="csvFile" accept=".csv" onchange="handleFileUpload()">

        <div class="check_box" id="check_box">모드 설정 중...</div>
        <div class="user-info" id="userInfo">로그인 정보 없음</div>

        <div class="choice" id="choiceBar">
            <button onclick="moveDay(-1)">◀ 이전 Day</button>
            <select id="daySelect" onchange="selectDay(this.value)">
                <option value="1">Day 1</option>
                <option value="2">Day 2</option>
            </select>
            <button onclick="moveDay(1)">다음 Day ▶</button>
            
            <button class="Korean" onclick="changeMode('ko')" style="margin-left: 15px;">Korean 모드</button>
            <button class="English" onclick="changeMode('en')">English 모드</button>
            <button class="login" onclick="logout()">LOGOUT</button>
        </div>

        <div id="quizContents" style="width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <div class="box_2" id="box_2">
                <h1 class="H1" id="h1">문제 로딩 중...</h1>
            </div>

            <div class="box">
                <input placeholder=" Answer.." class="input" id="input" autocomplete="off">
                <button onclick="checkWord()" class="button" id="button">Answer</button>
            </div>
        </div>

        <div id="reportContainer" style="display: none;"></div>

        <div class="detail" id="detail">결과가 여기에 표시됩니다.</div>

        <button class="history-trigger-btn" onclick="openHistoryModal()">📊 전체 학습 기록 확인하기</button>
    </div>

    <div id="historyModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeHistoryModal()">&times;</button>
            <h3>📋 누적 학생 학습 기록 (시스템 저장고)</h3>
            <p style="font-size:12px; color:gray;">* 본 기록은 브라우저(localStorage)에 안전하게 누적 보관됩니다.</p>
            <table class="result-table">

                        <th>일시</th>
                        <th>이름(학번)</th>

                        <th>최종 점수</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    const eyeSockets = document.querySelectorAll('.eye-socket');

    const input = document.getElementById("input");

    const checkBox = document.getElementById("check_box");

    /* ================= 1. 로그인 및 눈동자 인터랙션 스크립트 ================= */
    document.querySelector('body').addEventListener('mousemove', eyeball);
    function eyeball(event) {
        if (passwordInputEl === document.activeElement) return;
        const eyes = document.querySelectorAll('.eye');
        eyes.forEach(function(eye) {
            const rect = eye.getBoundingClientRect();
            const x = rect.left + (eye.clientWidth / 2);
            const y = rect.top + (eye.clientHeight / 2);
            const radian = Math.atan2(event.clientX - x, event.clientY - y);
            const rot = (radian * (180 / Math.PI) * -1) + 180;
            eye.style.transform = `rotate(${rot}deg) translateY(-8px)`;
        });
    }

    passwordInputEl.addEventListener('focus', () => { eyeSockets.forEach(socket => socket.classList.add('blind')); });
    passwordInputEl.addEventListener('blur', () => { eyeSockets.forEach(socket => socket.classList.remove('blind')); });
    passwordInputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') loginCheck(); });

    function loginCheck() {
        const currentName = nameInputEl.value.trim();
        const currentPassword = passwordInputEl.value.trim();

        if (!currentName || !currentPassword) {
            alert("이름과 비밀번호를 모두 입력해주세요.");
            return;
        }

        const matchedUser = users.find(u => u.name === currentName && u.password === currentPassword);

        if (matchedUser) {
            alert(`로그인 성공! 환영합니다, ${matchedUser.name}님.`);
            currentUser = matchedUser;
            
            // 화면 전환

            monsterFace.style.display = "none";
            testSection.style.display = "flex";

            updateDaySelectOptions(); // 드롭다운 옵션 갱신
            
            userInfoEl.innerText = `👤 로그인: ${currentUser.name}님`;

            daySelect.value = targetDay;

        }
    }

    /* ================= 2. 단원 나누기 및 선택/동적 로직 ================= */
    
    function updateDaySelectOptions() {
        const daySet = new Set(globalWordList.map(w => parseInt(w.day)));
        const sortedDays = Array.from(daySet).sort((a, b) => a - b);
        
        if(sortedDays.length > 0) {
            maxDayAvailable = Math.max(...sortedDays);
        }

        daySelect.innerHTML = "";
        sortedDays.forEach(day => {
            const option = document.createElement("option");
            option.value = day;
            option.innerText = `Day ${day}`;
            daySelect.appendChild(option);
        });
        
        daySelect.value = targetDay;
    }

    function selectDay(dayValue) {
        targetDay = parseInt(dayValue);
        setupDayQuestion();
    }

    function moveDay(direction) {
        let nextDay = targetDay + direction;
        const daySet = new Set(globalWordList.map(w => parseInt(w.day)));
        
        if (daySet.has(nextDay)) {
            targetDay = nextDay;
            daySelect.value = targetDay;
            setupDayQuestion();
        } else {
            if(direction > 0) {
                alert("마지막 단원입니다.");
            } else {
                alert("첫 번째 단원입니다.");
            }
        }
    }

    /* 🛡️ 추가: 오늘 이미 해당 단원을 제출했는지 체크하는 헬퍼 함수 */
    function checkTodayAttempt(username, day, mode) {
        const history = JSON.parse(localStorage.getItem("wordMasterHistory") || "[]");
        const todayStr = new Date().toLocaleDateString(); // "2026. 5. 28." 형식
        
        // 유저이름, 푸는 Day, 언어 모드, 오늘 날짜가 완벽히 일치하는 내역 탐색
        return history.find(h => h.username === username && h.day === day && h.mode === mode && h.dateOnly === todayStr);
    }

    function setupDayQuestion() {
        activeDayWords = globalWordList.filter(w => parseInt(w.day) === targetDay);

        if (activeDayWords.length === 0) {
            checkBox.innerText = `⚠️ Day ${targetDay} 단원에 등록된 단어가 없습니다.`;
            h1.innerText = "데이터 없음";
            input.disabled = true;
            return;
        }

        // 🛡️ [하루 1회 제한 시스템 작동] 로그인 상태일 때 오늘 기록 조회
        if(currentUser) {
            const alreadyRecord = checkTodayAttempt(currentUser.name, targetDay, currentMode);
            if(alreadyRecord) {
                alert(`⚠️ [일일 제한] ${currentUser.name}님은 오늘 이미 'Day ${targetDay} (${currentMode === 'ko' ? 'Korean' : 'English'})' 테스트를 완료하셨습니다!\n시험은 하루에 한 번만 응시 가능합니다. 기존 기록 성적표를 표기합니다.`);
                
                // 가짜결과 복원해서 성적표만 띄우기
                results = alreadyRecord.rawResults || [];
                showReportCard(true); // true 인자를 넘겨 재도전 버튼을 숨김 처리
                return;
            }
        }

        // 새 테스트 데이터 진입을 위한 전체 상태 초기화
        currentIndex = 0;
        results = [];

        // UI 토글 초기화 (성적표 닫고 퀴즈 오픈)
        quizContents.style.display = "flex";
        choiceBar.style.display = "flex";
        uploadBox.style.display = "block";
        detail.style.display = "flex";
        reportContainer.style.display = "none";

        input.disabled = false;
        const modeTxt = currentMode === "ko" ? "한글 뜻 보고 영어 맞추기" : "영단어 보고 한글 뜻 맞추기";
        checkBox.style.backgroundColor = "black";
        checkBox.innerText = `현재 모드: [Day ${targetDay} 단원 학습 중] ${modeTxt} (총 ${activeDayWords.length}단어)`;
        
        detail.innerText = "문제가 준비되었습니다. 답을 입력하세요!";
        detail.style.backgroundColor = "gray";
        nextQuestion();
    }

    function nextQuestion() {
        if (activeDayWords.length === 0) return;
        
        // 해당 단원의 문제를 모두 다 체크한 경우 성적표 리포트 출력
        if (currentIndex >= activeDayWords.length) { 
            // 💾 모든 문항 종료 시점에 로컬스토리지에 데이터 영구 저장
            saveScoreToStorage();
            showReportCard(false);
            return; 
        }

        const currentWord = activeDayWords[currentIndex];

        if (currentMode === "ko") {
            h1.innerText = currentWord.korean;
            input.placeholder = `(${currentIndex + 1}/${activeDayWords.length}) 영단어를 입력하세요..`;
        } else {
            h1.innerText = currentWord.english;
            input.placeholder = `(${currentIndex + 1}/${activeDayWords.length}) 뜻(한글)을 입력하세요..`;
        }
        input.value = '';
        input.focus();
    }

    function checkWord() {
        if(activeDayWords.length === 0 || input.disabled) return;

        const userAnswer = input.value.trim();
        if (userAnswer === "") {
            alert("답안을 입력해주세요!");
            return;
        }

        const currentWord = activeDayWords[currentIndex];
        let isCorrect = false;
        let correctAnswer = currentMode === "ko" ? currentWord.english : currentWord.korean;

        if (currentMode === "ko") {
            if (userAnswer.toLowerCase() === currentWord.english.toLowerCase()) isCorrect = true;
        } else {
            if (userAnswer === currentWord.korean || currentWord.korean.includes(userAnswer)) isCorrect = true;
        }

        // 결과 배열에 상세 이력 푸시
        results.push({
            question: currentMode === "ko" ? currentWord.korean : currentWord.english,
            userAnswer: userAnswer,
            correctAnswer: correctAnswer,
            isCorrect: isCorrect
        });

        // 채점 결과 실시간 피드백 노출 (틀려도 정답 가이드 제공 후 1.2초 뒤 다음 문제 자동 전환)
        if (isCorrect) {
            detail.innerText = `⭕ Correct! -> ${currentWord.english} : ${currentWord.korean}`;
            detail.style.backgroundColor = "#2ecc71";
        } else {
            detail.innerText = `❌ Incorrect! (정답: ${correctAnswer})`;
            detail.style.backgroundColor = "#e74c3c";
        }

        currentIndex++;
        input.disabled = true; // 딜레이 시간 동안 중복 입력 방지

        setTimeout(() => {
            input.disabled = false;
            nextQuestion();
        }, 1200);
    }

    /* 💾 추가: 로컬 스토리지에 학생 점수와 일시 기록하기 */
    function saveScoreToStorage() {
        if(!currentUser) return;

        const correctCount = results.filter(r => r.isCorrect).length;
        const totalCount = activeDayWords.length;
        const score = Math.round((correctCount / totalCount) * 100);
        
        const now = new Date();
        const timestamp = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`;
        const dateOnly = now.toLocaleDateString();

        const historyItem = {
            username: currentUser.name,
            password: currentUser.password,
            day: targetDay,
            mode: currentMode,
            scoreText: `${correctCount} / ${totalCount}개 (${score}점)`,
            timestamp: timestamp,
            dateOnly: dateOnly,
            rawResults: results // 오늘 다시 조회할 때 결과창 서포트용
        };

        // 기존 내역 불러와서 추가저장
        const existingHistory = JSON.parse(localStorage.getItem("wordMasterHistory") || "[]");
        existingHistory.push(historyItem);
        localStorage.setItem("wordMasterHistory", JSON.stringify(existingHistory));
    }

    /* ================= 3. 최종 결과 리포트(성적표) 빌더 함수 ================= */
    function showReportCard(isReadOnly = false) {
        // 인터페이스 정리
        quizContents.style.display = "none";
        choiceBar.style.display = "none";
        uploadBox.style.display = "none";
        detail.style.display = "none";

        const correctCount = results.filter(r => r.isCorrect).length;
        const totalCount = activeDayWords.length;
        const score = Math.round((correctCount / totalCount) * 100);

        checkBox.style.backgroundColor = "#2c3e50";
        checkBox.innerText = isReadOnly 
            ? `🏁 [조회 모드] 오늘 이미 제출된 Day ${targetDay} 결과 리포트입니다.`
            : `🏁 Day ${targetDay} 테스트 완료! 결과가 시스템에 저장되었습니다.`;

        let nextDay = targetDay + 1;
        const daySet = new Set(globalWordList.map(w => parseInt(w.day)));
        const hasNextDay = daySet.has(nextDay);

        let reportHtml = `
            <div class="report-card">
                <h2>📋 단원 평가 성적표 (Day ${targetDay})</h2>
                <div class="score">정답률: ${correctCount} / ${totalCount}개 (${score}점)</div>
                <table class="result-table">
                    <thead>
                        <tr>
                            <th style="width: 35%;">문제</th>
                            <th style="width: 25%;">제출한 답</th>
                            <th style="width: 25%;">실제 정답</th>
                            <th style="width: 15%;">판정</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        results.forEach(res => {
            reportHtml += `
                <tr>
                    <td><strong>${res.question}</strong></td>
                    <td>${res.userAnswer}</td>
                    <td>${res.correctAnswer}</td>
                    <td class="${res.isCorrect ? 'correct' : 'incorrect'}">${res.isCorrect ? '⭕ 정답' : '❌ 오답'}</td>
                </tr>
            `;
        });

        reportHtml += `
                    </tbody>
                </table>
                <div class="report-btns">
        `;

        // 🛡️ 오늘 이미 풀었다면 (isReadOnly) '다시 도전하기' 버튼은 렌더링하지 않음
        if (!isReadOnly) {
            reportHtml += `<button class="retry-btn" onclick="setupDayQuestion()">🔄 다시 도전하기</button>`;
        } else {
            reportHtml += `<span style="color:#e74c3c; font-size:14px; align-self:center; font-weight:bold;">⚠️ 오늘 시험 완료 (내일 재응시 가능)</span>`;
        }

        // 다음 Day 연동 데이터가 존재하는 경우 바로 다음 단원 이동 버튼 활성화
        if (hasNextDay) {
            reportHtml += `<button class="next-btn" onclick="goToNextDay(${nextDay})">⏩ 다음 Day ${nextDay} 풀기</button>`;
        }

        reportHtml += `
                    <button class="login" style="background-color: #e74c3c; color:white; border:none;" onclick="logout()">LOGOUT</button>
                </div>
            </div>
        `;

        reportContainer.innerHTML = reportHtml;
        reportContainer.style.display = "block";
    }

    function goToNextDay(nextDayNumber) {
        targetDay = nextDayNumber;
        daySelect.value = targetDay;
        setupDayQuestion();
    }

    function changeMode(mode) {
        currentMode = mode;
        setupDayQuestion();
    }

    /* ================= 4. 엑셀(CSV) 파일 업로드 처리기 ================= */
    function handleFileUpload() {
        const fileInput = document.getElementById("csvFile");
        const file = fileInput.files[0];
        
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            const lines = text.split("\n");
            const parsedWords = [];

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const columns = line.split(","); 
                if (columns.length >= 3) {
                    parsedWords.push({
                        day: parseInt(columns[0].trim()),
                        english: columns[1].trim(),
                        korean: columns[2].trim()
                    });
                }
            }

            if(parsedWords.length > 0) {
                globalWordList = parsedWords;
                alert(`엑셀(CSV) 로드 완료! 총 ${globalWordList.length}개의 단어가 연동되었습니다.`);
                
                updateDaySelectOptions(); 
                targetDay = parseInt(globalWordList[0].day); 
                daySelect.value = targetDay;
                
                setupDayQuestion();
            } else {
                alert("파일 파싱 실패: 형식이 올바르지 않습니다. (형식: 단원,영어,한글)");
            }
        };
        reader.readAsText(file, "EUC-KR"); 
    }

    function logout() {
        currentUser = null;
        testSection.style.display = "none";
        loginSection.style.display = "flex";
        monsterFace.style.display = "flex";
        nameInputEl.value = '';
        passwordInputEl.value = '';
        alert("로그아웃 되었습니다.");
    }

    /* ================= 5. 관리자/교사 누적 기록 뷰어 모달 제어 ================= */
    function openHistoryModal() {
        const history = JSON.parse(localStorage.getItem("wordMasterHistory") || "[]");
        const tbody = document.getElementById("historyTableBody");
        tbody.innerHTML = "";

        if(history.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="color:gray;">아직 제출된 기록이 존재하지 않습니다.</td></tr>`;
        } else {
            // 가장 최신 기록이 위로 올라오도록 역순정렬 배치
            history.slice().reverse().forEach(h => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${h.timestamp}</td>
                    <td><strong>${h.username}</strong> (${h.password})</td>
                    <td>Day ${h.day}</td>
                    <td><span style="color:purple; font-weight:bold;">${h.mode === 'ko' ? 'Korean' : 'English'}</span></td>
                    <td style="color:#27ae60; font-weight:bold;">${h.scoreText}</td>
                `;
                tbody.appendChild(tr);
            });
        }
        document.getElementById("historyModal").style.display = "flex";
    }

    function closeHistoryModal() {
        document.getElementById("historyModal").style.display = "none";
    }

    // 엔터키 입력 이벤트
    input.addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            checkWord();
        }
    });
</script>
